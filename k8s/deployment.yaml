apiVersion: apps/v1
kind: Deployment
metadata:
  name: codecompare-api
  labels:
    app: codecompare
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: codecompare
      component: api
  template:
    metadata:
      labels:
        app: codecompare
        component: api
    spec:
      containers:
        - name: api
          image: codecompare:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: codecompare-secrets
            - configMapRef:
                name: codecompare-config
          command:
            - uvicorn
            - config.asgi:application
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --workers
            - "4"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/languages/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/languages/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codecompare-worker
  labels:
    app: codecompare
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: codecompare
      component: worker
  template:
    metadata:
      labels:
        app: codecompare
        component: worker
    spec:
      containers:
        - name: worker
          image: codecompare:latest
          envFrom:
            - secretRef:
                name: codecompare-secrets
            - configMapRef:
                name: codecompare-config
          command:
            - celery
            - -A
            - config.celery
            - worker
            - -l
            - warning
            - -c
            - "4"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
