apiVersion: v1
kind: Service
metadata:
  name: codecompare-api
  labels:
    app: codecompare
    component: api
spec:
  selector:
    app: codecompare
    component: api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codecompare-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: codecompare.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: codecompare-api
                port:
                  number: 80
